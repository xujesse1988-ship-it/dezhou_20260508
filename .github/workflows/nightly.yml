name: Nightly fuzz

# D1 §输出 第 4 条：夜间 fuzz 任务。
#
# **运行环境：GitHub-hosted ubuntu-latest**（不维护 self-hosted runner）。
#
# 单 job 时长上限 6h（GitHub-hosted 硬性限制；超时 job 直接被 kill），所以本
# workflow 走 matrix 把 random_play / history_decode 两个 target 并行各跑 5h50m
# 每晚累计 fuzz 时间约 11h40m，覆盖介于 ci.yml fuzz-quick (10 min/push) 和 spec
# 原计划的 24h self-hosted 之间的中间态。**workflow §D1 §输出 第 4 条 「24 小时」
# 字面未达成，但 spec 意图（扩展时长 fuzz 覆盖低频 bug）以 ~12h/天 + 多日累计的
# 形式实现**。需要严格 24h 单跑时再切回 self-hosted（保留 git history commit
# 43cfedd^ 即上一版的 self-hosted yml 可恢复）。
#
# 预算考虑：matrix 2 × 5h50m × 30 天 ≈ 350h GH-Actions 分钟/月。public repo 免费；
# private repo 远超 2000-min 免费额度，需付费或降为 1 个 target。
#
# 触发：每天 02:00 UTC 自动；workflow_dispatch 可手动触发。

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  fuzz:
    name: cargo fuzz ${{ matrix.target }} ~5h50m
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5h50m，留 10 分钟 buffer 给 nightly toolchain 安装 + cargo fuzz install
    strategy:
      fail-fast: false  # 一个 target 出 crash artifact 不要 cancel 另一个
      matrix:
        target: [random_play, history_decode]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz"

      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: fuzz ${{ matrix.target }} 5h45m
        # libFuzzer -max_total_time 单位秒；20700 = 5h45m，给 timeout-minutes 留
        # 5 分钟 cleanup buffer，避免 GH kill 掉进程导致 artifact 丢失。
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=20700

      - name: upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-fuzz-${{ matrix.target }}-artifacts
          path: |
            fuzz/artifacts/${{ matrix.target }}/
            fuzz/corpus/${{ matrix.target }}/
          if-no-files-found: ignore

  bench-full:
    # E1 §输出：「全量 benchmark 夜间任务」。
    # 默认 criterion 参数（sample-size=100 / warm-up=3s / measurement=5s），
    # 3 个 group × 2 个 function ≈ 50–60s 实测耗时 + release build；与 fuzz job
    # 解耦在独立 runner 上跑，不与 fuzz 抢 CPU。
    #
    # 与 ci.yml::bench-quick 的关系：quick CI 路径 30s 内出粗略数据（push 时
    # 触发），nightly 用全量参数让 criterion 的统计输出更可信，作为长期
    # regression baseline。本 job 当前**不断言阈值**；E2 落地后由
    # tests/perf_slo.rs 负责阈值断言，bench 自身仍只产出数据。
    name: cargo bench --bench baseline (full)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: bench baseline (default profile)
        run: cargo bench --bench baseline -- --noplot
      - name: upload criterion report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-bench-criterion-report
          path: target/criterion/
          if-no-files-found: ignore
