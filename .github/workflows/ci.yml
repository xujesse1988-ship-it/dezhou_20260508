name: CI

# TODO(F2/E2): 跨平台 (macOS / ARM) job 见 D-052。阶段 1 仅作为 aspirational
# 目标，未列入 A1 出口；后续阶段一并补齐。

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  build:
    name: cargo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets

  test-build:
    name: cargo test --no-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      # D1 起：cargo test 已加入 test job 实跑。本 job 保留为编译期快速失败截断
      # （tests/api_signatures.rs spec-drift trip-wire 在更便宜的 stage 触发）。
      - run: cargo test --no-run

  test:
    name: cargo test (default + PokerKit if available)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install pokerkit
        run: pip install "pokerkit==0.4.14"
      - name: cargo test (default suite)
        # 默认套件含 100 手 cross_validation + 1k 手 cross_eval；PokerKit 缺失
        # 时自 skip，CI 必装以激活两条交叉验证。
        run: cargo test

  fuzz-quick:
    name: cargo fuzz random_play 5min
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz"
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: fuzz random_play 5 minutes
        # workflow §D1 §输出 第 5 条：每次 push 跑 100k 手 fuzz 5 分钟内。
        # libFuzzer 的 -max_total_time=300 给 5 分钟硬上限；机器实测 100k+ 执行
        # 数完全可达（B2 10k 手 ~5s debug → 1 核 5 分钟可跑 ~600k）。
        run: cargo +nightly fuzz run random_play -- -max_total_time=300
      - name: fuzz history_decode 5 minutes
        run: cargo +nightly fuzz run history_decode -- -max_total_time=300
      - name: upload fuzz artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/

  doc:
    name: cargo doc -D warnings
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps

  bench-quick:
    # E1 §输出：「短 benchmark CI 集成（30 秒内）」。
    # criterion 默认 sample-size=100 / warm-up=3s / measurement=5s，3 个 bench
    # group × 2 个 bench function = 6 个 bench → 默认 ≥48s。这里走 quick CLI：
    # sample-size=10、warm-up=1s、measurement=1s，每个 bench 实跑 ~2s ⇒ 总
    # ~12-20s（含 release build cache miss 时再加 ~30s build）。
    #
    # **不断言阈值**：本 job 只验证 bench harness 不 panic + 能产出数据。SLO
    # 阈值断言放 tests/perf_slo.rs，需 release profile + 显式 --ignored，由
    # E2 性能优化收尾时作为出口标准实跑。
    name: cargo bench --bench baseline (quick)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: bench baseline (quick profile)
        run: |
          cargo bench --bench baseline -- \
            --warm-up-time 1 \
            --measurement-time 1 \
            --sample-size 10 \
            --noplot
